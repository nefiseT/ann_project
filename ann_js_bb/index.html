<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANN Time Series Prediction</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="box">
            <h1>Neural Network Time Series Prediction</h1>
            <p>Compare 2-3 ANN models for cycling speed prediction</p>
        </header>

        <div class="main-content">
            <div class="controls box">
                <h2>Training Controls</h2>
                <div class="control-group">
                    <label for="modelSelect">Select Model:</label>
                    <select id="modelSelect">
                        <option value="simple">Simple ANN (1 Hidden Layer)</option>
                        <option value="deep">Deep ANN (3 Hidden Layers)</option>
                        <option value="lstm">LSTM (Recurrent Neural Network)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label for="epochs">Epochs:</label>
                    <input type="number" id="epochs" value="50" min="10" max="500">
                </div>
                <div class="control-group">
                    <label for="learningRate">Learning Rate:</label>
                    <input type="number" id="learningRate" value="0.01" step="0.001" min="0.001" max="1">
                </div>
                <div class="button-group">
                    <button id="trainBtn" class="btn primary">Train Model</button>
                    <button id="predictBtn" class="btn secondary" disabled>Predict</button>
                    <button id="compareBtn" class="btn accent">Compare Models</button>
                    <button id="resetBtn" class="btn danger">Reset</button>
                </div>
            </div>

            <div class="status box">
                <h2>Training Status</h2>
                <div id="statusText">Ready to train</div>
                <div class="progress-bar">
                    <div id="progressFill"></div>
                </div>
                <div id="epochInfo"></div>
            </div>

            <div class="results box">
                <h2>Results</h2>
                <div id="resultsContent">
                    <p>No results yet</p>
                </div>
            </div>

            <div class="chart box">
                <h2>Prediction Chart</h2>
                <canvas id="predictionChart"></canvas>
            </div>

            <div class="comparison box">
                <h2>Model Comparison</h2>
                <table id="comparisonTable">
                    <thead>
                        <tr>
                            <th>Model</th>
                            <th>MSE</th>
                            <th>R² Score</th>
                            <th>Training Time</th>
                        </tr>
                    </thead>
                    <tbody id="comparisonBody">
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="box">
            <p>ANN Project - Built with TensorFlow.js</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="models.js"></script>
    <script src="app.js"></script>
</body>
</html>
